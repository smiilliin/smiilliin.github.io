<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./icon.png"/>
  <title>JAPRadio</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffaf0;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --border: #d6d3d1;
      --shadow: 0 10px 30px rgba(15, 118, 110, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, #fde68a 0%, transparent 35%),
        radial-gradient(circle at 80% 90%, #99f6e4 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
    }

    .app {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px 24px;
    }

    .title-block {
      margin-bottom: 16px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-icon {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 6px 16px rgba(15, 118, 110, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.3rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .episode-list {
      margin: 0;
      list-style: none;
      padding: 8px;
      max-height: 70vh;
      overflow: auto;
    }

    .episode-btn {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 12px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      transition: all 180ms ease;
      margin-bottom: 6px;
    }

    .episode-btn:hover {
      border-color: var(--border);
      background: #fff;
    }

    .episode-btn.active {
      background: var(--accent-soft);
      border-color: #5eead4;
    }

    .ep-topic {
      font-weight: 700;
      margin: 0 0 4px;
      line-height: 1.35;
    }

    .ep-time {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0;
    }

    .viewer {
      padding: 18px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #ecfeff;
      color: #155e75;
      border: 1px solid #a5f3fc;
      font-size: 0.78rem;
      margin-bottom: 10px;
    }

    .topic {
      margin: 0 0 10px;
      font-size: clamp(1.2rem, 2.4vw, 1.65rem);
      line-height: 1.3;
    }

    .meta {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    audio {
      width: 100%;
      margin: 0 0 14px;
    }

    .script {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fffef8;
      padding: 18px;
      white-space: pre-wrap;
      line-height: 1.92;
      letter-spacing: 0.01em;
      font-size: 1.02rem;
      /* font-family: "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", "Noto Sans JP", sans-serif; */
      font-family: "Noto Sans JP", sans-serif;
      text-rendering: optimizeLegibility;
      word-break: keep-all;
      overflow-wrap: anywhere;
      min-height: 260px;
      max-height: 58vh;
      overflow: auto;
    }

    .empty {
      color: var(--muted);
      padding: 14px;
    }

    .status {
      margin-top: 10px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .episode-list {
        max-height: 42vh;
      }

      .script {
        font-size: 0.98rem;
        line-height: 1.84;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="title-block">
      <div class="title-row">
        <img class="title-icon" src="./icon.png" alt="JAPRadio icon">
        <h1>JAPRadio - ゆるっと電波</h1>
      </div>
      <p class="subtitle">A Japanese radio for beginner learners</p>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2 class="panel-title">Episodes</h2>
        </div>
        <ul id="episodeList" class="episode-list">
          <li class="empty">Loading scripts...</li>
        </ul>
      </aside>

      <article class="panel viewer">
        <span class="badge">Now Playing</span>
        <h2 id="topic" class="topic">Select an episode</h2>
        <p id="meta" class="meta">Choose an item from the list.</p>
        <audio id="player" controls preload="metadata"></audio>
        <pre id="script" class="script">Script text will appear here.</pre>
        <p id="status" class="status"></p>
      </article>
    </section>
  </main>

  <script>
    const episodeListEl = document.getElementById("episodeList");
    const topicEl = document.getElementById("topic");
    const metaEl = document.getElementById("meta");
    const scriptEl = document.getElementById("script");
    const playerEl = document.getElementById("player");
    const statusEl = document.getElementById("status");

    let allEpisodes = [];

    function formatTimeKey(timeKey) {
      if (!timeKey || !/^\d{8}_\d{6}$/.test(timeKey)) {
        return timeKey || "-";
      }
      const y = timeKey.slice(0, 4);
      const m = timeKey.slice(4, 6);
      const d = timeKey.slice(6, 8);
      const hh = timeKey.slice(9, 11);
      const mm = timeKey.slice(11, 13);
      return `${y}-${m}-${d} ${hh}:${mm}`;
    }

    async function fetchScriptFileNames() {
      try {
        const idxRes = await fetch("scripts/index.json", { cache: "no-store" });
        if (idxRes.ok) {
          const data = await idxRes.json();
          if (Array.isArray(data)) {
            return data.filter((name) => typeof name === "string" && name.endsWith(".json"));
          }
        }
      } catch (_error) {
        // Fallback below: parse directory index.
      }

      const res = await fetch("scripts/", { cache: "no-store" });
      if (!res.ok) {
        throw new Error("Unable to open scripts directory.");
      }
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      const names = [];
      for (const a of doc.querySelectorAll("a")) {
        const href = a.getAttribute("href") || "";
        const name = decodeURIComponent(href.split("?")[0].replace(/\/$/, "")).split("/").pop();
        if (name && name.endsWith(".json")) {
          names.push(name);
        }
      }
      return [...new Set(names)];
    }

    async function loadEpisodes() {
      const scriptNames = await fetchScriptFileNames();

      const loaded = await Promise.all(scriptNames.map(async (scriptName) => {
        const res = await fetch(`scripts/${scriptName}`, { cache: "no-store" });
        if (!res.ok) {
          return null;
        }
        const item = await res.json();
        const time = item.time || scriptName.replace(/\.json$/, "");
        return {
          filename: scriptName,
          time,
          topic: item.topic || "(No topic)",
          script: item.script || "",
          audio: `audio/${time}.mp3`
        };
      }));

      return loaded
        .filter(Boolean)
        .sort((a, b) => (a.time < b.time ? 1 : -1));
    }

    function setActiveButton(time) {
      for (const btn of episodeListEl.querySelectorAll(".episode-btn")) {
        btn.classList.toggle("active", btn.dataset.time === time);
      }
    }

    function showEpisode(ep) {
      topicEl.textContent = ep.topic;
      metaEl.textContent = `${formatTimeKey(ep.time)}`;
      scriptEl.textContent = ep.script;
      playerEl.src = ep.audio;
      playerEl.load();
      setActiveButton(ep.time);
      statusEl.textContent = "";
    }

    function renderEpisodeList(items) {
      episodeListEl.innerHTML = "";

      if (items.length === 0) {
        episodeListEl.innerHTML = '<li class="empty">No script found.</li>';
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const ep of items) {
        const li = document.createElement("li");
        const button = document.createElement("button");
        const topicP = document.createElement("p");
        const timeP = document.createElement("p");

        button.className = "episode-btn";
        button.dataset.time = ep.time;
        button.type = "button";

        topicP.className = "ep-topic";
        topicP.textContent = ep.topic;

        timeP.className = "ep-time";
        timeP.textContent = formatTimeKey(ep.time);

        button.append(topicP, timeP);
        button.addEventListener("click", () => showEpisode(ep));
        li.appendChild(button);
        fragment.appendChild(li);
      }
      episodeListEl.appendChild(fragment);
    }

    playerEl.addEventListener("error", () => {
      statusEl.textContent = "Audio file could not be loaded. Check matching .mp3 name in audio/.";
    });

    (async function init() {
      try {
        allEpisodes = await loadEpisodes();
        renderEpisodeList(allEpisodes);
        if (allEpisodes.length > 0) {
          showEpisode(allEpisodes[0]);
        }
      } catch (error) {
        episodeListEl.innerHTML = '<li class="empty">Failed to load scripts.</li>';
        statusEl.textContent = `${error.message} If directory listing is disabled, add scripts/index.json.`;
      }
    }());
  </script>
</body>
</html>
